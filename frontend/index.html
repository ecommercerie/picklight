<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickLight</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="logo">PickLight</div>
            <a href="#status" class="nav-link active" data-i18n="nav.status">Status</a>
            <a href="#settings" class="nav-link" data-i18n="nav.settings">Configuration</a>
            <a href="#about" class="nav-link" data-i18n="nav.about">A propos</a>
            <div class="sidebar-spacer"></div>
            <span id="app-version" class="nav-version"></span>
            <button id="quit-btn" class="nav-quit" data-i18n="nav.quit" onclick="window.go.main.App.QuitApp()">Quitter</button>
        </nav>
        <main id="app"></main>
    </div>
    <div id="toast" class="toast"></div>
    <script src="/i18n/fr.js"></script>
    <script src="/i18n/en.js"></script>
    <script src="/i18n/i18n.js"></script>
    <script src="/app.js"></script>
    <script src="/pages/status.js"></script>
    <script src="/pages/settings.js"></script>
    <script src="/pages/about.js"></script>
</body>
</html>
